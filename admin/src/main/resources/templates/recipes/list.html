<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Рецепты')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Рецепты')}"></div>

<div class="card-list">
  <a th:each="entry : ${groupedRecipes}" th:href="@{'/recipes/product/' + ${entry.key.id}}" class="item-card">
    <div class="title" th:text="${entry.key.name} + ' ' + ${entry.key.sizeLabel}"></div>
    <div class="subtitle" th:each="r : ${entry.value}"
         th:text="${#numbers.formatDecimal(r.quantityPerUnit, 1, 2, 'POINT')} + ' ' + ${r.ingredient.unit} + ' ' + ${r.ingredient.name}"></div>
  </a>

  <div th:if="${#maps.isEmpty(groupedRecipes)}" class="empty-state">
    <div class="icon">📋</div>
    Рецептов пока нет.<br/>Укажите, сколько сырья уходит на 1 единицу товара.
  </div>
</div>

<a th:href="@{/recipes/new}" class="fab" aria-label="Новый рецепт">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='')}"></div>
</body>
</html>
