<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Новый рецепт')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Новый рецепт')}"></div>

<div class="form-page">
  <div class="mb-3">
    <label class="form-label">Для какого товара настроить рецепт?</label>
    <select id="product-picker" class="form-select">
      <option value="">— выберите товар —</option>
      <option th:each="p : ${products}" th:value="@{'/recipes/product/' + ${p.id}}" th:text="${p.name} + ' ' + ${p.sizeLabel}"></option>
    </select>
  </div>
  <a th:href="@{/recipes}" class="btn btn-outline-secondary">Отмена</a>
</div>

<script>
  document.getElementById('product-picker').addEventListener('change', function () {
    if (this.value) {
      window.location.href = this.value;
    }
  });
</script>
</body>
</html>
