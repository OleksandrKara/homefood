<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${product.id} != null ? 'Изменить товар' : 'Новый товар')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${product.id} != null ? 'Изменить товар' : 'Новый товар')}"></div>

<form th:action="${product.id} != null ? @{'/products/' + ${product.id}} : @{/products}"
      th:object="${product}" method="post" class="form-page">
  <div class="mb-3">
    <label class="form-label">Название</label>
    <input type="text" th:field="*{name}" class="form-control" required autofocus/>
  </div>
  <div class="mb-3">
    <label class="form-label">Размер</label>
    <input type="text" th:field="*{sizeLabel}" class="form-control" placeholder="1lb"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Цена за 1 банку, $</label>
    <input type="number" step="0.01" min="0" th:field="*{basePrice}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label class="form-label">Остаток на складе, шт</label>
    <input type="number" min="0" th:field="*{stockQuantity}" class="form-control" required/>
    <div style="font-size:0.85rem; color:#868e96; margin-top:6px;">
      Пополняется автоматически при записи партии производства (заказы пока не списывают склад) — правьте вручную только для коррекции.
    </div>
  </div>
  <div class="mb-3 form-check">
    <input type="checkbox" th:field="*{active}" class="form-check-input" style="width:22px;height:22px;"/>
    <label class="form-check-label ms-2">Активен (показывать в заказах)</label>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/products}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>
</body>
</html>
