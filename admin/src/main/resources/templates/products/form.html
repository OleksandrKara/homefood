<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Товар — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width: 600px;">
  <h3 class="mb-3" th:text="${product.id} != null ? 'Изменить товар' : 'Новый товар'"></h3>
  <form th:action="${product.id} != null ? @{'/products/' + ${product.id}} : @{/products}"
        th:object="${product}" method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Название *</label>
      <input type="text" th:field="*{name}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Размер</label>
      <input type="text" th:field="*{sizeLabel}" class="form-control" placeholder="1lb"/>
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" th:field="*{active}" class="form-check-input"/>
      <label class="form-check-label">Активен</label>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark">Сохранить</button>
      <a href="/products" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
</body>
</html>
