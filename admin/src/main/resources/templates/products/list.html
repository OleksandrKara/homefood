<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Товары')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Товары')}"></div>

<div class="card-list">
  <a th:each="p : ${products}" th:href="@{'/products/' + ${p.id} + '/edit'}" class="item-card">
    <div class="row-top">
      <span class="title" th:text="${p.name} + ' ' + ${p.sizeLabel}"></span>
      <span class="badge-status" th:classappend="${p.active} ? 'badge-status-DONE' : 'badge-status-CANCELLED'"
            th:text="${p.active} ? 'активен' : 'скрыт'"></span>
    </div>
    <div class="subtitle" th:text="'$' + ${#numbers.formatDecimal(p.basePrice, 1, 2, 'POINT')} + ' / банка'"></div>
    <div class="meta">
      <span th:text="'На складе: ' + ${p.stockQuantity} + ' шт'"></span>
      <span th:if="${possibleBatches.get(p.id) != null}" th:text="'· можно сделать ещё ' + ${possibleBatches.get(p.id)}"></span>
    </div>
  </a>

  <div th:if="${#lists.isEmpty(products)}" class="empty-state">
    <div class="icon">🥬</div>
    Товаров пока нет.
  </div>
</div>

<a th:href="@{/products/new}" class="fab" aria-label="Новый товар">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='products')}"></div>
</body>
</html>
