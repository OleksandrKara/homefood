<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Товары — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Товары</h3>
    <a href="/products/new" class="btn btn-dark">+ Новый товар</a>
  </div>
  <table class="table table-striped bg-white">
    <thead>
    <tr>
      <th>Название</th>
      <th>Размер</th>
      <th>Активен</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${products}">
      <td th:text="${p.name}"></td>
      <td th:text="${p.sizeLabel}"></td>
      <td th:text="${p.active} ? 'да' : 'нет'"></td>
      <td><a th:href="@{'/products/' + ${p.id} + '/edit'}">Изменить</a></td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
