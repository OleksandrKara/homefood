<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${ingredient.id} != null ? 'Изменить сырьё' : 'Новое сырьё')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${ingredient.id} != null ? 'Изменить сырьё' : 'Новое сырьё')}"></div>

<form th:action="${ingredient.id} != null ? @{'/ingredients/' + ${ingredient.id}} : @{/ingredients}"
      th:object="${ingredient}" method="post" class="form-page">
  <div class="mb-3">
    <label class="form-label">Название</label>
    <input type="text" th:field="*{name}" class="form-control" required autofocus placeholder="Капуста"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Единица измерения</label>
    <input type="text" th:field="*{unit}" class="form-control" required placeholder="качан / фунт / кг"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Текущий остаток</label>
    <input type="number" step="0.01" th:field="*{stockQuantity}" class="form-control" required/>
    <div style="font-size:0.85rem; color:#868e96; margin-top:6px;">
      Обычно меняется автоматически (закупки и партии производства) — правьте вручную только для коррекции.
    </div>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/ingredients}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>
</body>
</html>
