<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${client.id} != null ? 'Изменить клиента' : 'Новый клиент')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${client.id} != null ? 'Изменить клиента' : 'Новый клиент')}"></div>

<form th:action="${client.id} != null ? @{'/clients/' + ${client.id}} : @{/clients}"
      th:object="${client}" method="post" class="form-page">
  <div class="mb-3">
    <label class="form-label">Имя</label>
    <input type="text" th:field="*{name}" class="form-control" required autofocus/>
  </div>
  <div class="mb-3">
    <label class="form-label">Телефон</label>
    <input type="tel" th:field="*{phone}" class="form-control" placeholder="+1 555 123 4567"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Адрес</label>
    <input type="text" th:field="*{address}" class="form-control"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Заметки</label>
    <textarea th:field="*{notes}" class="form-control"></textarea>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/clients}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>
</body>
</html>
