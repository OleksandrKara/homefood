<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${client.id} != null ? 'Изменить клиента' : 'Новый клиент')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${client.id} != null ? 'Изменить клиента' : 'Новый клиент')}"></div>

<form th:action="${client.id} != null ? @{'/clients/' + ${client.id}} : @{/clients}"
      th:object="${client}" method="post" class="form-page">
  <div th:if="${#fields.hasErrors('*')}" class="form-error-banner">
    <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
  </div>
  <div class="mb-3">
    <label class="form-label" for="name">Имя</label>
    <input type="text" th:field="*{name}" class="form-control" required autofocus/>
  </div>
  <div class="mb-3">
    <label class="form-label" for="phone">Телефон</label>
    <input type="tel" th:field="*{phone}" class="form-control" placeholder="+1 555 123 4567"/>
  </div>
  <div class="mb-3">
    <label class="form-label" for="address">Адрес</label>
    <input type="text" th:field="*{address}" class="form-control" list="address-suggestions" autocomplete="off"/>
  </div>
  <div class="mb-3">
    <label class="form-label" for="notes">Заметки</label>
    <textarea th:field="*{notes}" class="form-control"></textarea>
  </div>

  <datalist id="address-suggestions">
    <option th:each="a : ${addressSuggestions}" th:value="${a}"></option>
  </datalist>

  <div class="sticky-save-bar">
    <a th:href="@{/clients}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>

<div th:if="${client.id != null}">
  <h2 class="group-header">📦 История заказов</h2>
  <div class="history-stats" th:if="${!#lists.isEmpty(orderHistory)}">
    Всего заказов: <b th:text="${#lists.size(orderHistory)}"></b> ·
    Куплено на: <b th:text="'$' + ${#numbers.formatDecimal(totalSpent, 1, 2, 'POINT')}"></b>
  </div>
  <div class="card-list">
    <a th:each="o : ${orderHistory}" th:href="@{'/orders/' + ${o.id} + '/edit'}" class="item-card">
      <div class="row-top">
        <span class="title" th:text="${o.deliveryDate != null ? #temporals.format(o.deliveryDate, 'dd.MM.yyyy') : 'без даты'}"></span>
        <span class="badge-status" th:classappend="'badge-status-' + ${o.status}"
              th:text="${o.status.name() == 'REQUESTED' ? '🔔 Заявка' : (o.status.name() == 'NEW' ? 'Новый' : (o.status.name() == 'DONE' ? 'Готово' : 'Отменён'))}"></span>
      </div>
      <div class="subtitle"
           th:text="${o.product.name} + ' ' + ${o.product.sizeLabel} + ' · ' + ${o.quantity} + ' шт' + (${o.totalPrice} != null ? ' · $' + ${#numbers.formatDecimal(o.totalPrice, 1, 2, 'POINT')} : '')"></div>
    </a>
  </div>
  <div th:if="${#lists.isEmpty(orderHistory)}" class="empty-state" style="padding:30px 24px;">
    <div class="icon">📦</div>
    Заказов пока нет.
  </div>
</div>
</body>
</html>
