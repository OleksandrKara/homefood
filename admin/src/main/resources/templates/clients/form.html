<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Клиент — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width: 600px;">
  <h3 class="mb-3" th:text="${client.id} != null ? 'Изменить клиента' : 'Новый клиент'"></h3>
  <form th:action="${client.id} != null ? @{'/clients/' + ${client.id}} : @{/clients}"
        th:object="${client}" method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Имя *</label>
      <input type="text" th:field="*{name}" class="form-control" required/>
    </div>
    <div class="mb-3">
      <label class="form-label">Телефон</label>
      <input type="text" th:field="*{phone}" class="form-control"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Адрес</label>
      <input type="text" th:field="*{address}" class="form-control"/>
    </div>
    <div class="mb-3">
      <label class="form-label">Заметки</label>
      <textarea th:field="*{notes}" class="form-control" rows="3"></textarea>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark">Сохранить</button>
      <a href="/clients" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
</body>
</html>
