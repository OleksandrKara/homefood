<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Клиенты — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Клиенты</h3>
    <a href="/clients/new" class="btn btn-dark">+ Новый клиент</a>
  </div>
  <table class="table table-striped bg-white">
    <thead>
    <tr>
      <th>Имя</th>
      <th>Телефон</th>
      <th>Адрес</th>
      <th>Заметки</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${clients}">
      <td th:text="${c.name}"></td>
      <td th:text="${c.phone}"></td>
      <td th:text="${c.address}"></td>
      <td th:text="${c.notes}"></td>
      <td><a th:href="@{'/clients/' + ${c.id} + '/edit'}">Изменить</a></td>
    </tr>
    <tr th:if="${#lists.isEmpty(clients)}">
      <td colspan="5" class="text-muted">Клиентов пока нет</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
