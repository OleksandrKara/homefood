<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Клиенты')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Клиенты')}"></div>

<div class="card-list">
  <div th:each="c : ${clients}" class="item-card">
    <a th:href="@{'/clients/' + ${c.id} + '/edit'}" style="text-decoration:none; color:inherit; display:block;">
      <div class="title" th:text="${c.name}"></div>
      <div class="subtitle" th:if="${c.phone != null and !c.phone.isEmpty()}" th:text="${c.phone}"></div>
      <div class="meta" th:if="${c.address != null and !c.address.isEmpty()}" th:text="${c.address}"></div>
    </a>
    <div class="quick-actions">
      <a th:if="${c.phone != null and !c.phone.isEmpty()}" th:href="'tel:' + ${c.phone}">📞 Позвонить</a>
      <a th:if="${c.address != null and !c.address.isEmpty()}"
         th:href="'https://maps.google.com/?q=' + ${#uris.escapeQueryParam(c.address)}" target="_blank">🗺️ Карта</a>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(clients)}" class="empty-state">
    <div class="icon">👤</div>
    Клиентов пока нет.<br/>Нажмите «+», чтобы добавить первого.
  </div>
</div>

<a th:href="@{/clients/new}" class="fab" aria-label="Новый клиент">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='clients')}"></div>
</body>
</html>
