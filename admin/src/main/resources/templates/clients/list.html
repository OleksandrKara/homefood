<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Клиенты')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Клиенты')}"></div>

<div class="search-bar">
  <input type="search" id="client-search" class="form-control" placeholder="🔍 Поиск по имени, адресу..."/>
</div>

<div class="card-list">
  <th:block th:each="c : ${clients}">
    <div th:replace="~{fragments/client-card :: card(c=${c}, returnTo='/clients')}"></div>
  </th:block>

  <div th:if="${#lists.isEmpty(clients)}" class="empty-state">
    <div class="icon">👤</div>
    Клиентов пока нет.<br/>Нажмите «+», чтобы добавить первого.
  </div>
</div>

<div id="search-empty-state" class="empty-state" style="display:none;">
  <div class="icon">🔍</div>
  Ничего не найдено.
</div>

<div class="nav-link-list">
  <a th:href="@{/clients/archive}" class="nav-link-card">
    <span class="nav-link-icon">🗄</span>
    <span class="nav-link-label">Архив</span>
    <span class="count-badge" th:text="${archivedCount}"></span>
    <span class="chevron">›</span>
  </a>
</div>

<a th:href="@{/clients/new}" class="fab" aria-label="Новый клиент">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='clients')}"></div>
<div th:replace="~{fragments/order-card :: swipe-script}"></div>
<script>
  (function () {
    var searchInput = document.getElementById('client-search');
    if (!searchInput) return;
    var emptyState = document.getElementById('search-empty-state');
    searchInput.addEventListener('input', function () {
      var query = searchInput.value.trim().toLowerCase();
      var anyVisible = false;
      document.querySelectorAll('.order-card[data-search]').forEach(function (item) {
        var matches = query === '' || item.getAttribute('data-search').indexOf(query) !== -1;
        item.style.display = matches ? '' : 'none';
        if (matches) { anyVisible = true; }
      });
      emptyState.style.display = (query !== '' && !anyVisible) ? '' : 'none';
    });
  })();
</script>
</body>
</html>
