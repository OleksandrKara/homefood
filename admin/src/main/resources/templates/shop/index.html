<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title th:text="#{shop.title} + ' — Pickup'">homefood</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="shop-body">

<div class="shop-hero">
  <div class="shop-lang-switch">
    <a th:href="@{/shop(lang=ru)}" th:classappend="${#locale.language == 'ru'} ? ' active'">RU</a>
    <span>·</span>
    <a th:href="@{/shop(lang=en)}" th:classappend="${#locale.language == 'en'} ? ' active'">EN</a>
  </div>
  <div class="shop-hero-emoji">🍲</div>
  <h1 th:text="#{shop.title}"></h1>
  <p th:text="#{shop.subtitle}"></p>
  <a class="shop-address-link" th:if="${pickupAddress != null and !pickupAddress.isEmpty()}"
     th:href="'https://maps.google.com/?q=' + ${#uris.escapeQueryParam(pickupAddress)}" target="_blank">
    <span th:text="#{shop.address.pickup}"></span> <span th:text="${pickupAddress}"></span>
  </a>
</div>

<div class="shop-wrap">

  <div th:if="${reserved}" class="shop-alert shop-alert-success" th:text="#{shop.alert.success}"></div>
  <div th:if="${error}" class="shop-alert shop-alert-error" th:text="#{shop.alert.error}"></div>

  <div th:each="p : ${availableProducts}" class="shop-product-card"
       th:attr="data-product-id=${p.id},data-price=${p.basePrice},data-max=${maxQuantity},data-discount=${p.tieredDiscountEnabled}">
    <div class="shop-product-photo">
      <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}" th:src="${p.imageUrl}" alt=""/>
      <span th:unless="${p.imageUrl != null and !p.imageUrl.isEmpty()}" th:text="${iconByProduct.get(p.id)}"></span>
    </div>
    <div class="shop-product-info">
      <div class="shop-product-top">
        <div class="shop-product-name" th:text="${p.name} + ' ' + ${p.sizeLabel}"></div>
        <div class="shop-product-price" th:text="'$' + ${#numbers.formatDecimal(p.basePrice, 1, 2, 'POINT')}"></div>
      </div>
      <span class="shop-stock-badge shop-stock-in" th:if="${p.stockQuantity > 0}" th:text="#{shop.stock.in(${p.stockQuantity}, ${p.unit})}"></span>
      <span class="shop-stock-badge shop-stock-out" th:unless="${p.stockQuantity > 0}" th:text="#{shop.stock.out}"></span>

      <div class="shop-qty-row">
        <button type="button" class="shop-qty-btn shop-qty-minus" th:attr="aria-label=#{shop.qty.less}">−</button>
        <span class="shop-qty-value">0</span>
        <button type="button" class="shop-qty-btn shop-qty-plus" th:attr="aria-label=#{shop.qty.more}">+</button>
      </div>
    </div>
  </div>

  <div th:if="${!#lists.isEmpty(onDemandProducts)}" class="shop-section-label" th:text="#{shop.section.ondemand}"></div>
  <div th:each="p : ${onDemandProducts}" class="shop-product-card shop-product-card-compact"
       th:attr="data-product-id=${p.id},data-price=${p.basePrice},data-max=${maxQuantityOnDemand},data-discount=${p.tieredDiscountEnabled}">
    <div class="shop-product-photo">
      <img th:if="${p.imageUrl != null and !p.imageUrl.isEmpty()}" th:src="${p.imageUrl}" alt=""/>
      <span th:unless="${p.imageUrl != null and !p.imageUrl.isEmpty()}" th:text="${iconByProduct.get(p.id)}"></span>
    </div>
    <div class="shop-product-info">
      <div class="shop-product-top">
        <div class="shop-product-name" th:text="${p.name} + ' ' + ${p.sizeLabel}"></div>
        <div class="shop-product-price" th:text="'$' + ${#numbers.formatDecimal(p.basePrice, 1, 2, 'POINT')}"></div>
      </div>
      <span class="shop-stock-badge shop-stock-ondemand">
        <span th:text="#{shop.ondemand.badge}"></span>
        <span th:if="${p.prepTimeLabel != null and !p.prepTimeLabel.isEmpty()}" th:text="'· ⏱ ' + ${p.prepTimeLabel}"></span>
        <span th:unless="${p.prepTimeLabel != null and !p.prepTimeLabel.isEmpty()}">· ⏱ <span th:text="#{shop.ondemand.preptime.fallback}"></span></span>
      </span>

      <div class="shop-qty-row">
        <button type="button" class="shop-qty-btn shop-qty-minus" th:attr="aria-label=#{shop.qty.less}">−</button>
        <span class="shop-qty-value">0</span>
        <button type="button" class="shop-qty-btn shop-qty-plus" th:attr="aria-label=#{shop.qty.more}">+</button>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(allProducts)}" class="shop-product-card" th:text="#{shop.empty}"></div>

  <div class="shop-reserve" id="shop-checkout" th:if="${!#lists.isEmpty(allProducts)}">
    <h2 th:text="#{shop.checkout.title}"></h2>
    <p class="hint" th:text="#{shop.checkout.hint}"></p>

    <form id="shop-form" th:action="@{/shop/reserve}" method="post">
      <!-- Honeypot: invisible to real visitors, but basic bots that auto-fill every field will
           trip it. Left completely empty by a human, so a non-empty value means "not human". -->
      <div style="position:absolute; left:-9999px; top:-9999px;" aria-hidden="true">
        <label for="shop-website">Website</label>
        <input type="text" id="shop-website" name="website" tabindex="-1" autocomplete="off"/>
      </div>

      <div id="cart-lines"></div>

      <div class="mb-3">
        <label class="form-label" for="shop-name" th:text="#{shop.name.label}"></label>
        <input type="text" id="shop-name" name="name" class="form-control" required/>
      </div>
      <div class="mb-3">
        <label class="form-label" for="shop-phone" th:text="#{shop.phone.label}"></label>
        <input type="tel" id="shop-phone" name="phone" class="form-control" placeholder="+1 555 123 4567" required/>
        <div id="returning-customer-msg" class="shop-welcome-back" style="display:none;"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" th:text="#{shop.when.label}"></label>
        <div class="row g-2">
          <div class="col-7">
            <label class="visually-hidden" for="shop-date">Date</label>
            <input type="date" id="shop-date" name="preferredDate" class="form-control"/>
          </div>
          <div class="col-5">
            <label class="visually-hidden" for="shop-time">Time</label>
            <input type="time" id="shop-time" name="preferredTime" class="form-control"/>
          </div>
        </div>
        <div class="qty-cap" th:text="#{shop.when.hint}"></div>
      </div>

      <div class="mb-3">
        <label class="form-label" for="shop-notes" th:text="#{shop.notes.label}"></label>
        <textarea id="shop-notes" name="notes" class="form-control" th:placeholder="#{shop.notes.placeholder}"></textarea>
      </div>

      <div id="cart-summary-bar" class="shop-cart-summary">
        <span id="cart-count-label" th:text="#{shop.cart.count.prefix}"></span>
        <span id="cart-count-value">0</span>
        <span id="cart-total-label" th:text="#{shop.cart.total.prefix}"></span>
        <span id="cart-total-value">$0.00</span>
      </div>
      <div id="cart-empty-hint" class="qty-cap" th:text="#{shop.checkout.empty.hint}"></div>

      <button type="submit" id="shop-submit-btn" class="shop-submit" disabled th:text="#{shop.submit}"></button>
    </form>
  </div>

  <div class="shop-footer">🥬 homefood</div>
</div>

<div id="cart-bar" class="shop-cart-bar">
  <span id="cart-bar-text"></span>
  <button type="button" id="cart-bar-btn" th:text="#{shop.cart.checkout}"></button>
</div>

<script th:inline="javascript">
  var countPrefix = /*[[#{shop.cart.count.prefix}]]*/ 'In cart:';
  var totalPrefix = /*[[#{shop.cart.total.prefix}]]*/ 'Total:';

  // Mirrors OrderPricing.calculateTotal server-side: flat price x quantity, unless the product
  // has the tiered discount enabled - then within every group of 3 units the 2nd/3rd are $1 off,
  // and the pattern repeats for each further group of 3 (not just the first 3 units overall) -
  // currently only Квашеная капуста.
  function calculateTotal(basePrice, quantity, tieredDiscountEnabled) {
    if (!tieredDiscountEnabled) {
      return basePrice * quantity;
    }
    var total = 0;
    for (var unitIndex = 1; unitIndex <= quantity; unitIndex++) {
      var positionInGroup = ((unitIndex - 1) % 3) + 1;
      total += (positionInGroup === 2 || positionInGroup === 3) ? (basePrice - 1) : basePrice;
    }
    return total;
  }

  var cards = document.querySelectorAll('.shop-product-card[data-product-id]');
  var cartBar = document.getElementById('cart-bar');
  var cartBarText = document.getElementById('cart-bar-text');
  var cartCountValue = document.getElementById('cart-count-value');
  var cartTotalValue = document.getElementById('cart-total-value');
  var cartEmptyHint = document.getElementById('cart-empty-hint');
  var cartSummaryBar = document.getElementById('cart-summary-bar');
  var submitBtn = document.getElementById('shop-submit-btn');
  var cartLinesContainer = document.getElementById('cart-lines');
  var shopForm = document.getElementById('shop-form');

  function refreshCart() {
    var itemCount = 0;
    var total = 0;
    cards.forEach(function (card) {
      var qty = parseInt(card.querySelector('.shop-qty-value').textContent, 10) || 0;
      if (qty > 0) {
        itemCount += 1;
        total += calculateTotal(parseFloat(card.getAttribute('data-price')), qty, card.getAttribute('data-discount') === 'true');
      }
    });

    cartCountValue.textContent = itemCount;
    cartTotalValue.textContent = '$' + total.toFixed(2);
    cartBarText.textContent = countPrefix + ' ' + itemCount + ' · ' + totalPrefix + ' $' + total.toFixed(2);

    var hasItems = itemCount > 0;
    cartBar.classList.toggle('shop-cart-bar-visible', hasItems);
    cartSummaryBar.style.display = hasItems ? '' : 'none';
    cartEmptyHint.style.display = hasItems ? 'none' : '';
    submitBtn.disabled = !hasItems;
  }

  cards.forEach(function (card) {
    var max = parseInt(card.getAttribute('data-max'), 10) || 10;
    var valueEl = card.querySelector('.shop-qty-value');
    var minusBtn = card.querySelector('.shop-qty-minus');
    var plusBtn = card.querySelector('.shop-qty-plus');

    minusBtn.addEventListener('click', function () {
      var qty = parseInt(valueEl.textContent, 10) || 0;
      qty = Math.max(0, qty - 1);
      valueEl.textContent = qty;
      card.classList.toggle('shop-product-card-in-cart', qty > 0);
      refreshCart();
    });
    plusBtn.addEventListener('click', function () {
      var qty = parseInt(valueEl.textContent, 10) || 0;
      qty = Math.min(max, qty + 1);
      valueEl.textContent = qty;
      card.classList.toggle('shop-product-card-in-cart', qty > 0);
      refreshCart();
    });
  });

  document.getElementById('cart-bar-btn').addEventListener('click', function () {
    document.getElementById('shop-checkout').scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  shopForm.addEventListener('submit', function () {
    cards.forEach(function (card) {
      var qty = parseInt(card.querySelector('.shop-qty-value').textContent, 10) || 0;
      if (qty > 0) {
        var productIdInput = document.createElement('input');
        productIdInput.type = 'hidden';
        productIdInput.name = 'productId';
        productIdInput.value = card.getAttribute('data-product-id');
        cartLinesContainer.appendChild(productIdInput);

        var quantityInput = document.createElement('input');
        quantityInput.type = 'hidden';
        quantityInput.name = 'quantity';
        quantityInput.value = qty;
        cartLinesContainer.appendChild(quantityInput);
      }
    });
  });

  refreshCart();

  // Returning-customer greeting: async lookup by phone as soon as it looks complete enough,
  // debounced so it doesn't fire on every keystroke. Never touches the name field - the lookup
  // endpoint deliberately returns only a yes/no, not the stored name (see PublicShopController).
  (function () {
    var phoneInput = document.getElementById('shop-phone');
    var welcomeMsg = document.getElementById('returning-customer-msg');
    var welcomeText = /*[[#{shop.welcome.back}]]*/ 'Welcome back!';
    var lookupUrl = /*[[@{/shop/client-lookup}]]*/ '/admin/shop/client-lookup';
    var debounceTimer = null;

    function checkReturningCustomer() {
      var digits = phoneInput.value.replace(/[^0-9]/g, '');
      if (digits.length < 10) {
        welcomeMsg.style.display = 'none';
        return;
      }
      fetch(lookupUrl + '?phone=' + encodeURIComponent(phoneInput.value))
        .then(function (res) { return res.ok ? res.json() : null; })
        .then(function (data) {
          if (data && data.found) {
            welcomeMsg.textContent = welcomeText;
            welcomeMsg.style.display = '';
          } else {
            welcomeMsg.style.display = 'none';
          }
        })
        .catch(function () { /* non-critical enhancement - fail silently */ });
    }

    phoneInput.addEventListener('input', function () {
      welcomeMsg.style.display = 'none';
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(checkReturningCustomer, 500);
    });
  })();
</script>
</body>
</html>
