<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Партии')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Партии')}"></div>

<div class="card-list">
  <div th:each="b : ${batches}" class="item-card">
    <a th:href="@{'/production/' + ${b.id} + '/edit'}" style="text-decoration:none; color:inherit; display:block;">
      <div class="row-top">
        <span class="title" th:text="${#temporals.format(b.batchDate, 'dd.MM.yyyy')}"></span>
        <span class="badge-status" th:classappend="${b.status.name() == 'PLANNED'} ? 'badge-status-NEW' : 'badge-status-DONE'"
              th:text="(${b.status.name() == 'PLANNED'} ? '🗓 план ' : '✅ ') + '+' + ${b.quantityProduced} + ' шт'"></span>
      </div>
      <div class="subtitle" th:text="${b.product.name} + ' ' + ${b.product.sizeLabel}"></div>
      <div class="meta" th:if="${b.pickupLocation != null and !b.pickupLocation.isEmpty()}">
        <span th:text="'📍 ' + ${b.pickupLocation}"></span>
        <span th:if="${b.pickupWindow != null and !b.pickupWindow.isEmpty()}" th:text="'🕒 ' + ${b.pickupWindow}"></span>
      </div>
      <div class="meta" th:if="${b.notes != null and !b.notes.isEmpty()}">
        <span th:text="${b.notes}"></span>
      </div>
    </a>
    <div class="quick-actions" style="margin-top:10px;">
      <form th:if="${b.status.name() == 'PLANNED'}" th:action="@{'/production/' + ${b.id} + '/complete'}" method="post" style="flex:1;">
        <button type="submit" class="btn btn-dark btn-sm w-100"
                onclick="return confirm('Отметить партию готовой? Спишется сырьё и пополнится готовая продукция.');">Отметить готовой</button>
      </form>
      <a th:href="@{'/production/' + ${b.id} + '/edit'}" class="btn btn-outline-secondary btn-sm" style="flex:1;">Изменить</a>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(batches)}" class="empty-state">
    <div class="icon">🏭</div>
    Партий пока нет.
  </div>
</div>

<a th:href="@{/production/new}" class="fab" aria-label="Новая партия">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='expenses')}"></div>
</body>
</html>
