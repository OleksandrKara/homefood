<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${batch.id} != null ? 'Изменить партию' : 'Новая партия')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${batch.id} != null ? 'Изменить партию' : 'Новая партия')}"></div>

<form th:action="${batch.id} != null ? @{'/production/' + ${batch.id}} : @{/production}"
      th:object="${batch}" method="post" class="form-page">
  <div th:if="${#fields.hasErrors('*')}" class="form-error-banner">
    <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
  </div>
  <div class="mb-3">
    <label class="form-label">Статус</label>
    <div class="segmented">
      <input type="radio" id="st-planned" name="status" value="PLANNED"
             th:checked="${batch.status.name() == 'PLANNED'}" class="batch-status-radio"/>
      <label for="st-planned">🗓 Планируется</label>
      <input type="radio" id="st-done" name="status" value="DONE"
             th:checked="${batch.status.name() == 'DONE'}" class="batch-status-radio"/>
      <label for="st-done">✅ Уже сделано</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="productId">Товар</label>
    <select id="productId" name="productId" class="form-select" required>
      <option value="">— выберите товар —</option>
      <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name} + ' ' + ${p.sizeLabel}"
              th:selected="${batch.product != null and batch.product.id == p.id}"></option>
    </select>
  </div>
  <div class="mb-3">
    <label class="form-label" for="quantityProduced">Сколько банок</label>
    <input type="number" min="1" th:field="*{quantityProduced}" class="form-control" required/>
  </div>
  <div class="mb-3">
    <label class="form-label" for="batchDate">Дата</label>
    <input type="date" th:field="*{batchDate}" class="form-control" required/>
  </div>

  <div id="pickup-fields">
    <div class="mb-3">
      <label class="form-label" for="pickupLocation">Место самовывоза</label>
      <input type="text" th:field="*{pickupLocation}" class="form-control" placeholder="напр. San Diego, Downtown"/>
    </div>
    <div class="mb-3">
      <label class="form-label" for="pickupWindow">Время самовывоза</label>
      <input type="text" th:field="*{pickupWindow}" class="form-control" placeholder="напр. среда 14:00-18:00"/>
    </div>
    <div style="font-size:0.85rem; color:#868e96; margin-bottom:12px;">
      Место и время показываются клиентам на публичной странице для запланированных партий.
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="notes">Заметки</label>
    <textarea th:field="*{notes}" class="form-control" placeholder="необязательно"></textarea>
  </div>

  <div id="done-note" style="font-size:0.85rem; color:#868e96; margin-bottom:12px;">
    <span th:if="${batch.id} == null">Сохранение спишет сырьё по рецепту товара и пополнит остаток готовой продукции.</span>
    <span th:if="${batch.id} != null">Сохранение пересчитает склад: старый эффект этой партии отменится, новый — применится (по текущему рецепту).</span>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/production}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>

<form th:if="${batch.id} != null" th:action="@{'/production/' + ${batch.id} + '/delete'}" method="post" class="form-page pt-0">
  <button type="submit" class="btn btn-outline-danger w-100"
          onclick="return confirm('Удалить партию? Если она была отмечена «Уже сделано», склад скорректируется обратно.');">Удалить</button>
</form>

<script>
  function toggleBatchStatusFields() {
    var checked = document.querySelector('input[name="status"]:checked');
    var isDone = checked && checked.value === 'DONE';
    document.getElementById('done-note').style.display = isDone ? '' : 'none';
  }
  document.querySelectorAll('.batch-status-radio').forEach(function (el) {
    el.addEventListener('change', toggleBatchStatusFields);
  });
  toggleBatchStatusFields();
</script>
</body>
</html>
