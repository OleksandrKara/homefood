<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title>Вход — homefood</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="bg-light" style="padding-bottom:0;">
<div class="form-page" style="max-width: 380px; margin-top: 15vh;">
  <h3 class="mb-4 text-center">🥬 homefood</h3>
  <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
  <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы</div>
  <form th:action="@{/login}" method="post" class="card p-4 shadow-sm border-0" style="border-radius:16px;">
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" name="username" class="form-control" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" name="password" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-dark w-100">Войти</button>
  </form>
</div>
</body>
</html>
