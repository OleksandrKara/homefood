<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Вход — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container" style="max-width: 400px; margin-top: 100px;">
  <h3 class="mb-4 text-center">homefood admin</h3>
  <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
  <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы</div>
  <form th:action="@{/login}" method="post" class="card p-4 shadow-sm">
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" name="username" class="form-control" required autofocus/>
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <input type="password" name="password" class="form-control" required/>
    </div>
    <button type="submit" class="btn btn-dark w-100">Войти</button>
  </form>
</div>
</body>
</html>
