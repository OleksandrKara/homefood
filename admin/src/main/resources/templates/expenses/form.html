<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${expense.id} != null ? 'Изменить расход' : 'Новый расход')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${expense.id} != null ? 'Изменить расход' : 'Новый расход')}"></div>

<form th:action="${expense.id} != null ? @{'/expenses/' + ${expense.id}} : @{/expenses}"
      th:object="${expense}" method="post" class="form-page">

  <div th:if="${#fields.hasErrors('*')}" class="form-error-banner">
    <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
  </div>

  <div class="mb-3">
    <label class="form-label">Категория</label>
    <div class="segmented">
      <input type="radio" id="cat-investment" name="category" value="INVESTMENT"
             th:checked="${expense.category.name() == 'INVESTMENT'}" class="category-radio"/>
      <label for="cat-investment">🛠 Инвестиция</label>
      <input type="radio" id="cat-operational" name="category" value="OPERATIONAL"
             th:checked="${expense.category.name() == 'OPERATIONAL'}" class="category-radio"/>
      <label for="cat-operational">🥬 Операционные</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">На чьи деньги</label>
    <div class="segmented">
      <input type="radio" id="fs-investor" name="fundingSource" value="INVESTOR"
             th:checked="${expense.fundingSource.name() == 'INVESTOR'}"/>
      <label for="fs-investor">💼 Инвестор</label>
      <input type="radio" id="fs-working-capital" name="fundingSource" value="WORKING_CAPITAL"
             th:checked="${expense.fundingSource.name() == 'WORKING_CAPITAL'}"/>
      <label for="fs-working-capital">🔄 Оборотка</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="description">Описание</label>
    <input type="text" th:field="*{description}" class="form-control" required autofocus placeholder="Банки для консервации / 10 качанов капусты"/>
  </div>

  <div class="mb-3">
    <label class="form-label" for="amount">Сумма, $</label>
    <input type="number" step="0.01" min="0" th:field="*{amount}" class="form-control" required/>
  </div>

  <div class="mb-3">
    <label class="form-label" for="expenseDate">Дата</label>
    <input type="date" th:field="*{expenseDate}" class="form-control" required/>
  </div>

  <div id="ingredient-fields">
    <label class="form-label">Сырьё (пополнит склад)</label>
    <div id="ingredient-rows">
      <div class="recipe-row" th:each="r : ${rows}" style="display:flex; gap:8px; margin-bottom:10px; align-items:flex-start;">
        <select name="ingredientId" class="form-select" style="flex:2;">
          <option value="">— сырьё —</option>
          <option th:each="i : ${ingredients}" th:value="${i.id}" th:text="${i.name} + ' (' + ${i.unit} + ')'"
                  th:selected="${r.ingredient.id == i.id}"></option>
        </select>
        <input type="number" name="quantity" step="0.01" min="0.01" th:value="${r.quantity}"
               class="form-control" placeholder="кол-во" style="flex:1;"/>
        <button type="button" class="btn btn-outline-secondary remove-row" aria-label="Удалить строку" style="min-height:48px;">✕</button>
      </div>

      <div class="recipe-row" th:if="${#lists.isEmpty(rows)}" style="display:flex; gap:8px; margin-bottom:10px; align-items:flex-start;">
        <select name="ingredientId" class="form-select" style="flex:2;">
          <option value="">— сырьё —</option>
          <option th:each="i : ${ingredients}" th:value="${i.id}" th:text="${i.name} + ' (' + ${i.unit} + ')'"></option>
        </select>
        <input type="number" name="quantity" step="0.01" min="0.01" class="form-control" placeholder="кол-во" style="flex:1;"/>
        <button type="button" class="btn btn-outline-secondary remove-row" aria-label="Удалить строку" style="min-height:48px;">✕</button>
      </div>
    </div>

    <button type="button" id="add-ingredient-row" class="btn btn-outline-dark w-100 mb-3">+ Добавить сырьё</button>
    <a th:href="@{/ingredients/new}" target="_blank" class="d-inline-block mb-3" style="font-size:0.9rem;">+ Новое сырьё (в новой вкладке)</a>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/expenses}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>

<form th:if="${expense.id} != null" th:action="@{'/expenses/' + ${expense.id} + '/delete'}" method="post" class="form-page pt-0">
  <button type="submit" class="btn btn-outline-danger w-100"
          onclick="return confirm('Удалить расход? Если он был связан со складом, остаток сырья скорректируется обратно.');">Удалить</button>
</form>

<template id="empty-ingredient-row-template">
  <div class="recipe-row" style="display:flex; gap:8px; margin-bottom:10px; align-items:flex-start;">
    <select name="ingredientId" class="form-select" style="flex:2;">
      <option value="">— сырьё —</option>
      <option th:each="i : ${ingredients}" th:value="${i.id}" th:text="${i.name} + ' (' + ${i.unit} + ')'"></option>
    </select>
    <input type="number" name="quantity" step="0.01" min="0.01" class="form-control" placeholder="кол-во" style="flex:1;"/>
    <button type="button" class="btn btn-outline-secondary remove-row" aria-label="Удалить строку" style="min-height:48px;">✕</button>
  </div>
</template>

<script>
  function toggleIngredientFields() {
    var checked = document.querySelector('input[name="category"]:checked');
    var fields = document.getElementById('ingredient-fields');
    fields.style.display = (checked && checked.value === 'OPERATIONAL') ? '' : 'none';
  }
  document.querySelectorAll('.category-radio').forEach(function (el) {
    el.addEventListener('change', toggleIngredientFields);
  });
  toggleIngredientFields();

  var ingredientRowsContainer = document.getElementById('ingredient-rows');

  function wireRemoveButton(row) {
    var btn = row.querySelector('.remove-row');
    btn.addEventListener('click', function () {
      if (ingredientRowsContainer.children.length > 1) {
        row.remove();
      } else {
        row.querySelector('select').value = '';
        row.querySelector('input').value = '';
      }
    });
  }

  ingredientRowsContainer.querySelectorAll('.recipe-row').forEach(wireRemoveButton);

  document.getElementById('add-ingredient-row').addEventListener('click', function () {
    var template = document.getElementById('empty-ingredient-row-template');
    var clone = template.content.cloneNode(true);
    ingredientRowsContainer.appendChild(clone);
    wireRemoveButton(ingredientRowsContainer.lastElementChild);
  });
</script>
</body>
</html>
