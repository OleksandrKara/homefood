<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${expense.id} != null ? 'Изменить расход' : 'Новый расход')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${expense.id} != null ? 'Изменить расход' : 'Новый расход')}"></div>

<form th:action="${expense.id} != null ? @{'/expenses/' + ${expense.id}} : @{/expenses}"
      th:object="${expense}" method="post" class="form-page">

  <div class="mb-3">
    <label class="form-label">Категория</label>
    <div class="segmented">
      <input type="radio" id="cat-investment" name="category" value="INVESTMENT"
             th:checked="${expense.category.name() == 'INVESTMENT'}" class="category-radio"/>
      <label for="cat-investment">🛠 Инвестиция</label>
      <input type="radio" id="cat-operational" name="category" value="OPERATIONAL"
             th:checked="${expense.category.name() == 'OPERATIONAL'}" class="category-radio"/>
      <label for="cat-operational">🥬 Операционные</label>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label">Описание</label>
    <input type="text" th:field="*{description}" class="form-control" required autofocus placeholder="Банки для консервации / 10 качанов капусты"/>
  </div>

  <div class="mb-3">
    <label class="form-label">Сумма, $</label>
    <input type="number" step="0.01" min="0" th:field="*{amount}" class="form-control" required/>
  </div>

  <div class="mb-3">
    <label class="form-label">Дата</label>
    <input type="date" th:field="*{expenseDate}" class="form-control" required/>
  </div>

  <div id="ingredient-fields">
    <div class="mb-3">
      <label class="form-label">Сырьё (пополнит склад)</label>
      <select name="ingredientId" class="form-select">
        <option value="">— не связано со складом —</option>
        <option th:each="i : ${ingredients}" th:value="${i.id}" th:text="${i.name} + ' (' + ${i.unit} + ')'"
                th:selected="${expense.ingredient != null and expense.ingredient.id == i.id}"></option>
      </select>
      <a th:href="@{/ingredients/new}" target="_blank" class="d-inline-block mt-2" style="font-size:0.9rem;">+ Новое сырьё (в новой вкладке)</a>
    </div>
    <div class="mb-3">
      <label class="form-label">Купленное количество</label>
      <input type="number" step="0.01" min="0" th:field="*{quantity}" class="form-control" placeholder="напр. 10"/>
    </div>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/expenses}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>

<form th:if="${expense.id} != null" th:action="@{'/expenses/' + ${expense.id} + '/delete'}" method="post" class="form-page pt-0">
  <button type="submit" class="btn btn-outline-danger w-100"
          onclick="return confirm('Удалить расход? Если он был связан со складом, остаток сырья скорректируется обратно.');">Удалить</button>
</form>

<script>
  function toggleIngredientFields() {
    var checked = document.querySelector('input[name="category"]:checked');
    var fields = document.getElementById('ingredient-fields');
    fields.style.display = (checked && checked.value === 'OPERATIONAL') ? '' : 'none';
  }
  document.querySelectorAll('.category-radio').forEach(function (el) {
    el.addEventListener('change', toggleIngredientFields);
  });
  toggleIngredientFields();
</script>
</body>
</html>
