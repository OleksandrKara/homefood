<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${order.id} != null ? 'Изменить заказ' : 'Новый заказ')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title=${order.id} != null ? 'Изменить заказ' : 'Новый заказ')}"></div>

<form th:action="${order.id} != null ? @{'/orders/' + ${order.id}} : @{/orders}"
      th:object="${order}" method="post" class="form-page">

  <div th:if="${#fields.hasErrors('*')}" class="form-error-banner">
    <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="clientId">Клиент</label>
    <select id="clientId" name="clientId" class="form-select" required>
      <option value="">— выберите клиента —</option>
      <option th:each="c : ${clients}" th:value="${c.id}"
              th:text="${c.name} + (${c.phone} != null ? ' — ' + ${c.phone} : '')"
              th:selected="${order.client != null and order.client.id == c.id}"></option>
    </select>
    <a th:href="@{/clients/new}" target="_blank" class="d-inline-block mt-2" style="font-size:0.9rem;">+ Новый клиент (в новой вкладке)</a>
  </div>

  <div class="mb-3">
    <label class="form-label" for="product-select">Товар</label>
    <select id="product-select" name="productId" class="form-select" required>
      <option th:each="p : ${products}" th:value="${p.id}" th:attr="data-price=${p.basePrice}"
              th:text="${p.name} + ' ' + ${p.sizeLabel} + ' — $' + ${#numbers.formatDecimal(p.basePrice, 1, 2, 'POINT')} + '/банка'"
              th:selected="${order.product != null and order.product.id == p.id}"></option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label" for="quantity-input">Количество банок</label>
    <input type="number" min="1" id="quantity-input" th:field="*{quantity}" class="form-control" required/>
    <div id="price-estimate" class="mt-2" style="font-size:1.05rem; font-weight:600;"></div>
  </div>

  <div class="mb-3">
    <label class="form-label">Способ получения</label>
    <div class="segmented">
      <input type="radio" id="dt-pickup" name="deliveryType" value="PICKUP"
             th:checked="${order.deliveryType.name() == 'PICKUP'}" class="delivery-type-radio"/>
      <label for="dt-pickup">🏠 Самовывоз</label>
      <input type="radio" id="dt-delivery" name="deliveryType" value="DELIVERY"
             th:checked="${order.deliveryType.name() == 'DELIVERY'}" class="delivery-type-radio"/>
      <label for="dt-delivery">🚚 Доставка</label>
    </div>
  </div>

  <div id="delivery-fields">
    <div class="mb-3">
      <label class="form-label" for="district">Район</label>
      <select th:field="*{district}" class="form-select">
        <option value="">— выберите район —</option>
        <option th:each="d : ${districts}" th:value="${d.name}" th:text="${d.name}"></option>
        <option th:if="${order.district != null and !order.district.isEmpty() and !districts.![name].contains(order.district)}"
                th:value="${order.district}" th:text="${order.district}" selected></option>
      </select>
      <a th:href="@{/districts/new}" target="_blank" class="d-inline-block mt-2" style="font-size:0.9rem;">+ Новый район (в новой вкладке)</a>
    </div>
    <div class="mb-3">
      <label class="form-label" for="deliveryAddress">Адрес доставки</label>
      <input type="text" th:field="*{deliveryAddress}" class="form-control" list="address-suggestions" autocomplete="off"/>
    </div>
    <div class="mb-3">
      <label class="form-label" for="deliveryDetails">Детали доставки</label>
      <textarea th:field="*{deliveryDetails}" class="form-control" placeholder="этаж, домофон, инструкции..."></textarea>
    </div>
  </div>

  <datalist id="address-suggestions">
    <option th:each="a : ${addressSuggestions}" th:value="${a}"></option>
  </datalist>

  <div class="row mb-3">
    <div class="col-6">
      <label class="form-label" for="deliveryDate">Дата</label>
      <input type="date" th:field="*{deliveryDate}" class="form-control"/>
    </div>
    <div class="col-6">
      <label class="form-label" for="deliveryTime">Время</label>
      <input type="time" th:field="*{deliveryTime}" class="form-control"/>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="status-select">Статус</label>
    <select id="status-select" th:field="*{status}" class="form-select">
      <option th:each="s : ${statuses}" th:value="${s}"
              th:text="${s.name() == 'REQUESTED' ? 'Заявка (не подтверждён)' : (s.name() == 'NEW' ? 'Новый' : (s.name() == 'DONE' ? 'Готово' : 'Отменён'))}"></option>
    </select>
  </div>

  <div id="done-fields">
    <div class="mb-3">
      <label class="form-label" for="paymentMethod">Оплата</label>
      <select th:field="*{paymentMethod}" class="form-select">
        <option value="">— способ оплаты —</option>
        <option th:each="pm : ${paymentMethods}" th:value="${pm.name}" th:text="${pm.name}"></option>
        <option th:if="${order.paymentMethod != null and !order.paymentMethod.isEmpty() and !paymentMethods.![name].contains(order.paymentMethod)}"
                th:value="${order.paymentMethod}" th:text="${order.paymentMethod}" selected></option>
      </select>
      <a th:href="@{/payment-methods/new}" target="_blank" class="d-inline-block mt-2" style="font-size:0.9rem;">+ Новый способ оплаты (в новой вкладке)</a>
    </div>
    <div class="mb-3">
      <label class="form-label" for="tipAmount">Чаевые, $</label>
      <input type="number" step="0.01" min="0" id="tipAmount" th:field="*{tipAmount}" class="form-control" placeholder="необязательно"/>
    </div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="notes">Заметки</label>
    <textarea th:field="*{notes}" class="form-control" placeholder="любая дополнительная информация..."></textarea>
  </div>

  <div class="sticky-save-bar">
    <a th:href="@{/orders}" class="btn btn-outline-secondary">Отмена</a>
    <button type="submit" class="btn btn-dark">Сохранить</button>
  </div>
</form>

<script>
  function toggleDeliveryFields() {
    var checked = document.querySelector('input[name="deliveryType"]:checked');
    var deliveryFields = document.getElementById('delivery-fields');
    deliveryFields.style.display = (checked && checked.value === 'DELIVERY') ? '' : 'none';
  }
  document.querySelectorAll('.delivery-type-radio').forEach(function (el) {
    el.addEventListener('change', toggleDeliveryFields);
  });
  toggleDeliveryFields();

  function toggleDoneFields() {
    var statusSelect = document.getElementById('status-select');
    var doneFields = document.getElementById('done-fields');
    doneFields.style.display = (statusSelect.value === 'DONE') ? '' : 'none';
  }
  document.getElementById('status-select').addEventListener('change', toggleDoneFields);
  toggleDoneFields();

  // Mirrors OrderPricing.calculateTotal server-side: jar 1 full price,
  // jars 2-3 discounted $1 each, jar 4+ back to full price.
  function calculateTotal(basePrice, quantity) {
    var total = 0;
    for (var jarIndex = 1; jarIndex <= quantity; jarIndex++) {
      total += (jarIndex === 2 || jarIndex === 3) ? (basePrice - 1) : basePrice;
    }
    return total;
  }

  function updatePriceEstimate() {
    var productSelect = document.getElementById('product-select');
    var quantityInput = document.getElementById('quantity-input');
    var estimateEl = document.getElementById('price-estimate');
    var option = productSelect.options[productSelect.selectedIndex];
    var basePrice = option ? parseFloat(option.getAttribute('data-price')) : NaN;
    var quantity = parseInt(quantityInput.value, 10);
    if (isNaN(basePrice) || isNaN(quantity) || quantity < 1) {
      estimateEl.textContent = '';
      return;
    }
    var total = calculateTotal(basePrice, quantity);
    estimateEl.textContent = 'Итого: $' + total.toFixed(2);
  }

  document.getElementById('product-select').addEventListener('change', updatePriceEstimate);
  document.getElementById('quantity-input').addEventListener('input', updatePriceEstimate);
  updatePriceEstimate();
</script>
</body>
</html>
