<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Заказ — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container" style="max-width: 700px;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3 th:text="${order.id} != null ? 'Изменить заказ' : 'Новый заказ'"></h3>
    <a href="/clients/new" target="_blank" class="btn btn-sm btn-outline-dark">+ Новый клиент (в новой вкладке)</a>
  </div>
  <form th:action="${order.id} != null ? @{'/orders/' + ${order.id}} : @{/orders}"
        th:object="${order}" method="post" class="card p-4 shadow-sm">

    <div class="mb-3">
      <label class="form-label">Клиент *</label>
      <select name="clientId" class="form-select" required>
        <option value="">— выберите клиента —</option>
        <option th:each="c : ${clients}" th:value="${c.id}"
                th:text="${c.name} + (${c.phone} != null ? ' — ' + ${c.phone} : '')"
                th:selected="${order.client != null and order.client.id == c.id}"></option>
      </select>
    </div>

    <div class="row mb-3">
      <div class="col-8">
        <label class="form-label">Товар *</label>
        <select name="productId" class="form-select" required>
          <option th:each="p : ${products}" th:value="${p.id}"
                  th:text="${p.name} + ' ' + ${p.sizeLabel}"
                  th:selected="${order.product != null and order.product.id == p.id}"></option>
        </select>
      </div>
      <div class="col-4">
        <label class="form-label">Кол-во банок *</label>
        <input type="number" min="1" th:field="*{quantity}" class="form-control" required/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label d-block">Способ получения *</label>
      <div class="form-check form-check-inline" th:each="dt : ${deliveryTypes}">
        <input class="form-check-input delivery-type-radio" type="radio" th:field="*{deliveryType}" th:value="${dt}"/>
        <label class="form-check-label" th:text="${dt.name() == 'PICKUP'} ? 'Самовывоз' : 'Доставка'"></label>
      </div>
    </div>

    <div id="delivery-fields">
      <div class="mb-3">
        <label class="form-label">Район</label>
        <input type="text" th:field="*{district}" class="form-control"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Адрес доставки</label>
        <input type="text" th:field="*{deliveryAddress}" class="form-control"/>
      </div>
      <div class="mb-3">
        <label class="form-label">Детали доставки</label>
        <textarea th:field="*{deliveryDetails}" class="form-control" rows="2" placeholder="этаж, домофон, инструкции..."></textarea>
      </div>
    </div>

    <div class="row mb-3">
      <div class="col-6">
        <label class="form-label">Дата доставки/самовывоза</label>
        <input type="date" th:field="*{deliveryDate}" class="form-control"/>
      </div>
      <div class="col-6">
        <label class="form-label">Время</label>
        <input type="time" th:field="*{deliveryTime}" class="form-control"/>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Статус</label>
      <select th:field="*{status}" class="form-select">
        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
      </select>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-dark">Сохранить</button>
      <a href="/orders" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>

<script th:inline="javascript">
  function toggleDeliveryFields() {
    var checked = document.querySelector('input[name="deliveryType"]:checked');
    var deliveryFields = document.getElementById('delivery-fields');
    deliveryFields.style.display = (checked && checked.value === 'DELIVERY') ? '' : 'none';
  }
  document.querySelectorAll('.delivery-type-radio').forEach(function (el) {
    el.addEventListener('change', toggleDeliveryFields);
  });
  toggleDeliveryFields();
</script>
</body>
</html>
