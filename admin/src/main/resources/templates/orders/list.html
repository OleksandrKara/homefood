<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Заказы — homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/nav :: nav}"></div>
<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Заказы</h3>
    <a href="/orders/new" class="btn btn-dark">+ Новый заказ</a>
  </div>
  <table class="table table-striped bg-white">
    <thead>
    <tr>
      <th>Дата</th>
      <th>Время</th>
      <th>Клиент</th>
      <th>Товар</th>
      <th>Кол-во</th>
      <th>Тип</th>
      <th>Адрес / район</th>
      <th>Статус</th>
      <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="o : ${orders}">
      <td th:text="${o.deliveryDate}"></td>
      <td th:text="${o.deliveryTime}"></td>
      <td th:text="${o.client.name}"></td>
      <td th:text="${o.product.name} + ' ' + ${o.product.sizeLabel}"></td>
      <td th:text="${o.quantity}"></td>
      <td th:text="${o.deliveryType.name() == 'PICKUP' ? 'Самовывоз' : 'Доставка'}"></td>
      <td th:text="${o.deliveryType.name() == 'DELIVERY'} ? (${o.district} ?: '') + ' / ' + (${o.deliveryAddress} ?: '') : ''"></td>
      <td th:text="${o.status}"></td>
      <td><a th:href="@{'/orders/' + ${o.id} + '/edit'}">Изменить</a></td>
    </tr>
    <tr th:if="${#lists.isEmpty(orders)}">
      <td colspan="9" class="text-muted">Заказов пока нет</td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
