<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Заказы')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Заказы')}"></div>

<div class="stats-block">
  <div class="stats-card sold">
    <div class="stats-label">💰 Продано</div>
    <div class="stats-value" th:text="'$' + ${#numbers.formatDecimal(soldTotal, 1, 2)}"></div>
  </div>
  <div class="stats-card expected">
    <div class="stats-label">⏳ Ожидается</div>
    <div class="stats-value" th:text="'$' + ${#numbers.formatDecimal(expectedTotal, 1, 2)}"></div>
  </div>
</div>

<div th:if="${!#lists.isEmpty(requestedOrders)}">
  <h2 class="group-header">🔔 Новые заявки</h2>
  <div class="card-list">
    <th:block th:each="o : ${requestedOrders}">
      <div th:replace="~{fragments/order-card :: card(o=${o}, returnTo='/orders')}"></div>
    </th:block>
  </div>
</div>

<div th:each="dateEntry : ${groupedOrders}">
  <h2 class="group-header" th:text="${dateEntry.key}"></h2>
  <div th:each="subEntry : ${dateEntry.value}">
    <h3 class="subgroup-header" th:text="${subEntry.key}"></h3>
    <div class="card-list">
      <th:block th:each="o : ${subEntry.value}">
        <div th:replace="~{fragments/order-card :: card(o=${o}, returnTo='/orders')}"></div>
      </th:block>
    </div>
  </div>
</div>

<div th:if="${#lists.isEmpty(requestedOrders) and #maps.isEmpty(groupedOrders)}" class="empty-state">
  <div class="icon">📦</div>
  Активных заказов пока нет.<br/>Нажмите «+», чтобы добавить первый.
</div>

<div class="nav-link-list">
  <a th:href="@{/orders/processed}" class="nav-link-card">
    <span class="nav-link-icon">📦</span>
    <span class="nav-link-label">Обработанные</span>
    <span class="count-badge" th:text="${processedCount}"></span>
    <span class="chevron">›</span>
  </a>
  <a th:href="@{/orders/archive}" class="nav-link-card">
    <span class="nav-link-icon">🗄</span>
    <span class="nav-link-label">Архив</span>
    <span class="count-badge" th:text="${archivedCount}"></span>
    <span class="chevron">›</span>
  </a>
</div>

<a th:href="@{/orders/new}" class="fab" aria-label="Новый заказ">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='orders')}"></div>
<div th:replace="~{fragments/order-card :: swipe-script}"></div>
</body>
</html>
