<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Заказы')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Заказы')}"></div>

<div th:if="${!#lists.isEmpty(requestedOrders)}">
  <h2 class="group-header">🔔 Новые заявки</h2>
  <div class="card-list">
    <th:block th:each="o : ${requestedOrders}">
      <div th:replace="~{fragments/order-card :: card(o=${o})}"></div>
    </th:block>
  </div>
</div>

<div th:each="dateEntry : ${groupedOrders}">
  <h2 class="group-header" th:text="${dateEntry.key}"></h2>
  <div th:each="subEntry : ${dateEntry.value}">
    <h3 class="subgroup-header" th:text="${subEntry.key}"></h3>
    <div class="card-list">
      <th:block th:each="o : ${subEntry.value}">
        <div th:replace="~{fragments/order-card :: card(o=${o})}"></div>
      </th:block>
    </div>
  </div>
</div>

<div th:if="${#lists.isEmpty(requestedOrders) and #maps.isEmpty(groupedOrders) and #lists.isEmpty(doneOrders)}" class="empty-state">
  <div class="icon">📦</div>
  Заказов пока нет.<br/>Нажмите «+», чтобы добавить первый.
</div>

<div th:if="${!#lists.isEmpty(doneOrders)}">
  <h2 class="group-header">✅ Готово</h2>
  <div class="card-list">
    <th:block th:each="o : ${doneOrders}">
      <div th:replace="~{fragments/order-card :: card(o=${o})}"></div>
    </th:block>
  </div>
</div>

<a th:href="@{/orders/new}" class="fab" aria-label="Новый заказ">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='orders')}"></div>
</body>
</html>
