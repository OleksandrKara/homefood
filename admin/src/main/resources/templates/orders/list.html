<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Заказы')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar(title='Заказы')}"></div>

<div class="stats-block">
  <div class="stats-card sold">
    <div class="stats-label">💰 Продано</div>
    <div class="stats-value" th:text="'$' + ${#numbers.formatDecimal(soldTotal, 1, 2, 'POINT')}"></div>
  </div>
  <div class="stats-card expected">
    <div class="stats-label">⏳ Ожидается</div>
    <div class="stats-value" th:text="'$' + ${#numbers.formatDecimal(expectedTotal, 1, 2, 'POINT')}"></div>
  </div>
  <div class="stats-card tips">
    <div class="stats-label">💵 Чаевые</div>
    <div class="stats-value" th:text="'$' + ${#numbers.formatDecimal(tipsTotal, 1, 2, 'POINT')}"></div>
  </div>
</div>

<div class="search-bar">
  <input type="search" id="order-search" class="form-control" placeholder="🔍 Поиск по клиенту, району, адресу..."/>
</div>

<div th:if="${!#lists.isEmpty(requestedOrders)}" class="requested-group">
  <h2 class="group-header">🔔 Новые заявки</h2>
  <div class="card-list">
    <th:block th:each="o : ${requestedOrders}">
      <div th:replace="~{fragments/order-card :: card(o=${o}, returnTo='/orders')}"></div>
    </th:block>
  </div>
</div>

<div th:each="dateEntry : ${groupedOrders}" class="date-group">
  <h2 class="group-header group-toggle" th:classappend="${dateEntry.key != 'Сегодня'} ? ' is-collapsed'">
    <span th:text="${dateEntry.key}"></span>
    <span class="group-header-right">
      <span class="jars-badge" th:text="'🫙 ' + ${jarsByDate.get(dateEntry.key)}"></span>
      <span class="chevron group-chevron">›</span>
    </span>
  </h2>
  <div class="group-body" th:classappend="${dateEntry.key != 'Сегодня'} ? ' collapsed'">
    <div th:each="subEntry : ${dateEntry.value}" class="sub-group">
      <h3 class="subgroup-header" th:text="${subEntry.key}"></h3>
      <div class="card-list">
        <th:block th:each="o : ${subEntry.value}">
          <div th:replace="~{fragments/order-card :: card(o=${o}, returnTo='/orders')}"></div>
        </th:block>
      </div>
    </div>
  </div>
</div>

<div th:if="${#lists.isEmpty(requestedOrders) and #maps.isEmpty(groupedOrders)}" class="empty-state">
  <div class="icon">📦</div>
  Активных заказов пока нет.<br/>Нажмите «+», чтобы добавить первый.
</div>

<div id="search-empty-state" class="empty-state" style="display:none;">
  <div class="icon">🔍</div>
  Ничего не найдено.
</div>

<div class="nav-link-list">
  <a th:href="@{/orders/processed}" class="nav-link-card">
    <span class="nav-link-icon">📦</span>
    <span class="nav-link-label">Обработанные</span>
    <span class="count-badge" th:text="${processedCount}"></span>
    <span class="chevron">›</span>
  </a>
  <a th:href="@{/orders/archive}" class="nav-link-card">
    <span class="nav-link-icon">🗄</span>
    <span class="nav-link-label">Архив</span>
    <span class="count-badge" th:text="${archivedCount}"></span>
    <span class="chevron">›</span>
  </a>
</div>

<a th:href="@{/orders/new}" class="fab" aria-label="Новый заказ">+</a>

<div th:replace="~{fragments/layout :: bottomnav(active='orders')}"></div>
<div th:replace="~{fragments/order-card :: swipe-script}"></div>
<script>
  document.querySelectorAll('.group-toggle').forEach(function (header) {
    header.addEventListener('click', function () {
      header.classList.toggle('is-collapsed');
      var body = header.nextElementSibling;
      if (body && body.classList.contains('group-body')) {
        body.classList.toggle('collapsed');
      }
    });
  });

  (function () {
    var searchInput = document.getElementById('order-search');
    if (!searchInput) return;

    var dateGroups = document.querySelectorAll('.date-group');
    var requestedGroup = document.querySelector('.requested-group');
    var emptyState = document.getElementById('search-empty-state');
    var wasSearching = false;

    searchInput.addEventListener('input', function () {
      var query = searchInput.value.trim().toLowerCase();
      var isSearching = query !== '';

      if (isSearching && !wasSearching) {
        // entering search mode - remember current collapse state so we can restore it after
        dateGroups.forEach(function (group) {
          var header = group.querySelector('.group-toggle');
          header.dataset.wasCollapsed = header.classList.contains('is-collapsed') ? '1' : '0';
        });
      }

      var anyVisible = false;

      if (requestedGroup) {
        var requestedMatches = 0;
        requestedGroup.querySelectorAll('.swipe-item[data-search]').forEach(function (item) {
          var matches = !isSearching || item.getAttribute('data-search').indexOf(query) !== -1;
          item.style.display = matches ? '' : 'none';
          if (matches) { requestedMatches++; }
        });
        requestedGroup.style.display = requestedMatches > 0 ? '' : 'none';
        if (requestedMatches > 0) { anyVisible = true; }
      }

      dateGroups.forEach(function (group) {
        var header = group.querySelector('.group-toggle');
        var body = group.querySelector('.group-body');
        var groupMatches = 0;

        group.querySelectorAll('.sub-group').forEach(function (sub) {
          var subMatches = 0;
          sub.querySelectorAll('.swipe-item[data-search]').forEach(function (item) {
            var matches = !isSearching || item.getAttribute('data-search').indexOf(query) !== -1;
            item.style.display = matches ? '' : 'none';
            if (matches) { subMatches++; }
          });
          sub.style.display = subMatches > 0 ? '' : 'none';
          groupMatches += subMatches;
        });

        group.style.display = groupMatches > 0 ? '' : 'none';
        if (groupMatches > 0) { anyVisible = true; }

        if (isSearching) {
          if (groupMatches > 0) {
            header.classList.remove('is-collapsed');
            body.classList.remove('collapsed');
          }
        } else if (wasSearching) {
          var wasCollapsed = header.dataset.wasCollapsed === '1';
          header.classList.toggle('is-collapsed', wasCollapsed);
          body.classList.toggle('collapsed', wasCollapsed);
        }
      });

      emptyState.style.display = (isSearching && !anyVisible) ? '' : 'none';
      wasSearching = isSearching;
    });
  })();
</script>
</body>
</html>
