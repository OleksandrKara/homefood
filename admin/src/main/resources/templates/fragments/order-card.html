<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="card(o, returnTo)" class="order-card"
     th:attr="data-search=${#strings.toLowerCase((o.client.name ?: '') + ' ' + (o.district ?: '') + ' ' + (o.deliveryAddress ?: ''))}">

  <div class="swipe-item">
    <form th:if="${!o.archived}" th:action="@{'/orders/' + ${o.id} + '/archive'}" method="post" class="swipe-action swipe-action-archive">
      <input type="hidden" name="returnTo" th:value="${returnTo}"/>
      <button type="submit">🗄<span>Архив</span></button>
    </form>
    <form th:if="${o.archived}" th:action="@{'/orders/' + ${o.id} + '/unarchive'}" method="post" class="swipe-action swipe-action-restore">
      <input type="hidden" name="returnTo" th:value="${returnTo}"/>
      <button type="submit">↩<span>Вернуть</span></button>
    </form>

    <a data-swipe th:href="@{'/orders/' + ${o.id} + '/edit'}" class="item-card swipe-content">
      <div class="row-top">
        <span class="title" th:text="${o.deliveryDate != null ? #temporals.format(o.deliveryDate, 'dd.MM') : 'без даты'} + (${o.deliveryTime} != null ? ' · ' + ${#temporals.format(o.deliveryTime, 'HH:mm')} : '')"></span>
        <span class="badge-status" th:classappend="'badge-status-' + ${o.status}"
              th:text="${o.status.name() == 'REQUESTED' ? '🔔 Заявка' : (o.status.name() == 'NEW' ? 'Новый' : (o.status.name() == 'DONE' ? 'Готово' : 'Отменён'))}"></span>
      </div>
      <div class="subtitle" th:text="${o.client.name}"></div>
      <div class="subtitle" th:each="item : ${o.items}"
           th:text="${item.product.name} + ' ' + ${item.product.sizeLabel} + ' · ' + ${item.quantity} + ' ' + ${item.product.unit}"></div>
      <div class="subtitle" th:if="${o.totalPrice != null}" th:text="'Итого: $' + ${#numbers.formatDecimal(o.totalPrice, 1, 2, 'POINT')}"></div>
      <div class="meta">
        <span th:text="${o.deliveryType.name() == 'PICKUP'} ? '🏠 Самовывоз' : '🚚 Доставка'"></span>
        <span th:if="${o.deliveryType.name() == 'DELIVERY' and o.district != null and !o.district.isEmpty()}" th:text="${o.district}"></span>
        <span th:each="p : ${o.payments}" th:text="'💳 ' + ${p.paymentMethod} + ' $' + ${#numbers.formatDecimal(p.amount, 1, 2, 'POINT')}"></span>
        <span th:if="${o.tipAmount != null and o.tipAmount.signum() > 0}" th:text="'💵 +$' + ${#numbers.formatDecimal(o.tipAmount, 1, 2, 'POINT')} + ' чай'"></span>
      </div>
      <div class="meta" th:if="${o.notes != null and !o.notes.isEmpty()}">
        <span>📝 <span th:text="${o.notes}"></span></span>
      </div>
    </a>
  </div>

  <div class="order-card-actions"
       th:if="${(o.client.phone != null and !o.client.phone.isEmpty()) or (o.deliveryAddress != null and !o.deliveryAddress.isEmpty())}">
    <a th:if="${o.client.phone != null and !o.client.phone.isEmpty()}" th:href="'tel:' + ${o.client.phone}">📞 Позвонить</a>
    <a th:if="${o.deliveryAddress != null and !o.deliveryAddress.isEmpty()}"
       th:href="'https://maps.google.com/?q=' + ${#uris.escapeQueryParam(o.deliveryAddress)}" target="_blank">🗺️ Карта</a>
  </div>
</div>

<script th:fragment="swipe-script">
  (function () {
    var THRESHOLD = 48;
    var REVEAL = 96;
    document.querySelectorAll('[data-swipe]').forEach(function (el) {
      var startX = 0, deltaX = 0, dragging = false, swiped = false, moved = false;

      el.addEventListener('touchstart', function (e) {
        startX = e.touches[0].clientX;
        deltaX = 0;
        moved = false;
        dragging = true;
        el.style.transition = 'none';
      }, { passive: true });

      el.addEventListener('touchmove', function (e) {
        if (!dragging) return;
        deltaX = e.touches[0].clientX - startX;
        if (Math.abs(deltaX) > 8) {
          moved = true;
          var base = swiped ? -REVEAL : 0;
          var next = Math.min(0, Math.max(-REVEAL, base + deltaX));
          el.style.transform = 'translateX(' + next + 'px)';
        }
      }, { passive: true });

      el.addEventListener('touchend', function () {
        dragging = false;
        el.style.transition = 'transform 0.2s ease';
        var base = swiped ? -REVEAL : 0;
        var finalPos = base + deltaX;
        if (finalPos < -THRESHOLD) {
          el.style.transform = 'translateX(-' + REVEAL + 'px)';
          swiped = true;
        } else {
          el.style.transform = 'translateX(0)';
          swiped = false;
        }
      });

      el.addEventListener('click', function (e) {
        if (moved || swiped) {
          e.preventDefault();
          if (swiped) {
            el.style.transition = 'transform 0.2s ease';
            el.style.transform = 'translateX(0)';
            swiped = false;
          }
        }
      });
    });
  })();
</script>
</body>
</html>
