<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <!-- Regular <form>s get their CSRF token auto-injected by the Thymeleaf Spring Security dialect;
       fetch()-based AJAX calls don't go through a <form>, so they read the token from here instead. -->
  <meta name="_csrf" th:content="${_csrf.token}" th:if="${_csrf != null}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}" th:if="${_csrf != null}"/>
  <title th:text="${title} + ' — homefood'">homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</th:block>
</head>
<body>

<th:block th:fragment="topbar(title)">
<div class="top-bar">
  <h1 th:text="${title}">Заголовок</h1>
  <div class="menu-wrap">
    <button type="button" class="btn-logout menu-toggle" aria-label="Меню">☰</button>
    <div class="dropdown-menu">
      <a th:href="@{/districts}">📍 Районы</a>
      <a th:href="@{/payment-methods}">💳 Способы оплаты</a>
      <a th:href="@{/recipes}">📋 Рецепты</a>
      <a th:href="@{/settings}">🏪 Настройки магазина</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit">⏻ Выйти</button>
      </form>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('.menu-toggle').forEach(function (btn) {
    var menu = btn.nextElementSibling;
    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      menu.classList.toggle('show');
    });
    document.addEventListener('click', function (e) {
      if (menu.classList.contains('show') && !menu.contains(e.target) && e.target !== btn) {
        menu.classList.remove('show');
      }
    });
  });
</script>
</th:block>

<nav th:fragment="bottomnav(active)" class="bottom-nav">
  <a th:href="@{/orders}" th:classappend="${active == 'orders'} ? 'active'">
    <span class="icon">📦</span>Заказы
  </a>
  <a th:href="@{/clients}" th:classappend="${active == 'clients'} ? 'active'">
    <span class="icon">👤</span>Клиенты
  </a>
  <a th:href="@{/products}" th:classappend="${active == 'products'} ? 'active'">
    <span class="icon">🥬</span>Товары
  </a>
  <a th:href="@{/expenses}" th:classappend="${active == 'expenses'} ? 'active'">
    <span class="icon">💰</span>Расходы
  </a>
</nav>

</body>
</html>
