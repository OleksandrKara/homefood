<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
  <title th:text="${title} + ' — homefood'">homefood admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</th:block>
</head>
<body>

<div th:fragment="topbar(title)" class="top-bar">
  <h1 th:text="${title}">Заголовок</h1>
  <form th:action="@{/logout}" method="post">
    <button class="btn-logout" type="submit" aria-label="Выйти">⏻</button>
  </form>
</div>

<nav th:fragment="bottomnav(active)" class="bottom-nav">
  <a th:href="@{/orders}" th:classappend="${active == 'orders'} ? 'active'">
    <span class="icon">📦</span>Заказы
  </a>
  <a th:href="@{/clients}" th:classappend="${active == 'clients'} ? 'active'">
    <span class="icon">👤</span>Клиенты
  </a>
  <a th:href="@{/products}" th:classappend="${active == 'products'} ? 'active'">
    <span class="icon">🥬</span>Товары
  </a>
</nav>

</body>
</html>
