spring:
  application:
    name: homefood-admin

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:homefood}
    username: ${DB_USER:homefood}
    password: ${DB_PASSWORD:homefood}
    hikari:
      initialization-fail-timeout: -1

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  thymeleaf:
    cache: false

  # Without this, Spring's default MessageSource behavior can prefer the *container's* system
  # locale (en_US here) over the neutral messages.properties bundle for locales that don't have
  # their own file (ru falls back to the root bundle, which is Russian) - causing the shop page to
  # render in English even when Russian was explicitly resolved. See messages.properties (ru,
  # default) / messages_en.properties.
  messages:
    fallback-to-system-locale: false

app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}

server:
  port: 8080
  forward-headers-strategy: framework
  servlet:
    context-path: /admin
    session:
      timeout: 24h
      cookie:
        max-age: 24h

management:
  endpoints:
    web:
      exposure:
        include: health, info

logging:
  level:
    org.flywaydb: INFO
