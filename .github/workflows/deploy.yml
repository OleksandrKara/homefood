name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: homefood
          POSTGRES_USER: homefood
          POSTGRES_PASSWORD: homefood
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U homefood -d homefood"
          --health-interval 5s --health-timeout 5s --health-retries 12
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Backend tests (incl. Flyway migrations against Postgres)
        working-directory: admin
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: homefood
          DB_USER: homefood
          DB_PASSWORD: homefood
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: test-only-password
        run: ./mvnw -B -ntp test

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          HOST: ${{ secrets.VPS_HOST }}
          USER: ${{ secrets.VPS_USER }}
          PORT: ${{ secrets.VPS_PORT }}
          APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key && chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${PORT:-22}" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -p "${PORT:-22}" "$USER@$HOST" bash -se <<EOF
            set -euo pipefail
            cd "${APP_DIR:-\$HOME/homefood}"
            git fetch origin main
            # Match main exactly; the gitignored .env (secrets) and the postgres volume are untouched.
            git reset --hard origin/main
            sudo docker compose up -d --build
            sudo docker image prune -f
            for i in \$(seq 1 30); do
              if [ "\$(sudo docker inspect -f '{{.State.Health.Status}}' homefood-admin 2>/dev/null)" = "healthy" ]; then
                echo "admin healthy"; break
              fi
              sleep 3
            done
            sudo docker compose ps
          EOF
