# Rate-limit zones dedicated to homefood (kept separate from other apps' shared
# /etc/nginx/conf.d/ratelimit.conf to avoid any cross-app coupling).
#
# 5r/m on login: blunts password brute-forcing.
# 6r/m on the public reservation endpoint: a real customer submits one reservation
# (maybe retries once or twice); anything faster than that from one IP is spam/bot traffic.
# 20r/m on the client-lookup endpoint: it's debounced client-side to fire on phone-field pauses,
# not keystrokes, so a real visitor fires it a handful of times at most; a tighter limit than that
# blunts phone-number enumeration (the endpoint only returns yes/no, never a name, but "is this
# phone a customer" is still worth rate-limiting against a scripted scan).
limit_req_zone $binary_remote_addr zone=homefood_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=homefood_shop_reserve:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=homefood_client_lookup:10m rate=20r/m;
