# Nginx reverse-proxy config for food.akluxnails.com (homefood admin panel, V1).
#
# This is a snapshot of the LIVE config at /etc/nginx/sites-available/food.akluxnails.com
# on the VPS (kept here for version control / disaster recovery).
#
# Single instance (no blue/green) — this is an internal admin tool, not ads-serving
# traffic, so a brief restart during deploy is acceptable.
#
# To restore from scratch on a fresh box:
#   sudo cp nginx/food.akluxnails.com.conf /etc/nginx/sites-available/food.akluxnails.com
#   sudo ln -s /etc/nginx/sites-available/food.akluxnails.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d food.akluxnails.com
upstream homefood_admin {
    server 127.0.0.1:8010;
}

server {
    server_name food.akluxnails.com;

    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Internal admin tool — keep it out of search indexes.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://homefood_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/food.akluxnails.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/food.akluxnails.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = food.akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name food.akluxnails.com;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot
}
