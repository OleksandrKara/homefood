# Nginx reverse-proxy config for food.akluxnails.com (homefood, V1).
#
# This is a snapshot of the LIVE config at /etc/nginx/sites-available/food.akluxnails.com
# on the VPS (kept here for version control / disaster recovery).
#
# Two audiences on one domain:
#   - "/"       -> public storefront (/shop), no login, indexable, shareable with customers
#   - "/admin*" -> the admin panel, login-protected, kept out of search indexes
#
# The domain is proxied through Cloudflare, so every request nginx sees arrives from a
# Cloudflare edge IP, not the real visitor - set_real_ip_from/real_ip_header below restore
# the actual visitor IP (from CF-Connecting-IP) so rate limiting below is keyed on the real
# client, not on Cloudflare itself. Cloudflare IP ranges from https://www.cloudflare.com/ips/
# (re-fetch and update if Cloudflare ever changes them).
#
# Rate-limit zones (homefood_login, homefood_shop_reserve) are defined in
# /etc/nginx/conf.d/homefood-ratelimit.conf (also checked into nginx/ alongside this file).
#
# Single instance (no blue/green) — a brief restart during deploy is acceptable.
#
# To restore from scratch on a fresh box:
#   sudo cp nginx/homefood-ratelimit.conf /etc/nginx/conf.d/homefood-ratelimit.conf
#   sudo cp nginx/food.akluxnails.com.conf /etc/nginx/sites-available/food.akluxnails.com
#   sudo ln -s /etc/nginx/sites-available/food.akluxnails.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d food.akluxnails.com
upstream homefood_admin {
    server 127.0.0.1:8010;
}

server {
    server_name food.akluxnails.com;

    server_tokens off;

    # Cloudflare edge IPv4/IPv6 ranges - trust these to supply the real client IP.
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # Public storefront - the app itself lives under /admin (Spring context-path),
    # so the bare domain root is rewritten internally to /admin/shop.
    location = / {
        proxy_pass http://homefood_admin/admin/shop;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public reservation submission - rate-limited against spam/bot floods.
    location = /admin/shop/reserve {
        limit_req zone=homefood_shop_reserve burst=3 nodelay;
        limit_req_status 429;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://homefood_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin login - rate-limited against password brute-forcing.
    location = /admin/login {
        limit_req zone=homefood_login burst=3 nodelay;
        limit_req_status 429;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://homefood_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin panel (login-protected) and everything else the app serves
    # (static assets, etc.) - all under /admin.
    location /admin {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Keep the admin tool out of search indexes.
        add_header X-Robots-Tag "noindex, nofollow" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        proxy_pass http://homefood_admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/food.akluxnails.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/food.akluxnails.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = food.akluxnails.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name food.akluxnails.com;

    listen 80;
    listen [::]:80;
    return 404; # managed by Certbot
}
